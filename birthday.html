<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎉 Birthday Invite · 29th July</title>
  <style>
    /* 整体背景——温柔的暖色渐变 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #fff5e9 0%, #ffe6d5 100%);
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
      position: relative;
    }

    /* 装饰性光斑（增加氛围） */
    body::before {
      content: '';
      position: absolute;
      top: 20px;
      left: 20px;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle at 30% 30%, #ffc2a1, transparent 70%);
      border-radius: 50%;
      opacity: 0.3;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: 30px;
      right: 20px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle at 70% 70%, #ffddb0, transparent 70%);
      border-radius: 50%;
      opacity: 0.25;
      pointer-events: none;
    }

    /* 主卡片——白色磨砂质感，柔和阴影，稍微放宽最大宽度以适应大图 */
    .birthday-card {
      max-width: 820px;    /* 增大卡片宽度，让图片更有呼吸感 */
      width: 100%;
      background: rgba(255, 250, 245, 0.9);
      backdrop-filter: blur(4px);
      background: #fffcf8;
      box-shadow: 0 25px 50px -12px rgba(140, 70, 30, 0.25),
                  0 4px 18px 0 rgba(0,0,0,0.05),
                  inset 0 1px 2px rgba(255,255,255,0.8);
      border-radius: 48px 48px 40px 40px;
      padding: 2.5rem 2rem 2rem;
      border: 1px solid rgba(255, 230, 210, 0.7);
      transition: transform 0.2s ease;
      position: relative;
      z-index: 2;
    }

    .birthday-card:hover {
      transform: scale(1.01);
    }

    /* 标题区域 */
    .birthday-card h1 {
      font-size: 3.2rem;
      font-weight: 700;
      color: #b34a2c;
      text-align: center;
      letter-spacing: -0.02em;
      margin-bottom: 0.2rem;
      text-shadow: 2px 2px 0 #ffd8c4, 4px 4px 0 rgba(255,160,120,0.3);
      line-height: 1.2;
    }

    .birthday-card h2 {
      font-size: 2rem;
      font-weight: 400;
      color: #a15c38;
      text-align: center;
      border-bottom: 2px dashed #fbc4a0;
      padding-bottom: 0.8rem;
      margin: 0 1rem 1.8rem 1rem;
      font-family: 'Georgia', cursive, serif;
    }

    /* 段落区块 */
    .section {
      margin: 1.8rem 0 2rem;
    }

    .section p {
      font-size: 1.2rem;
      color: #4d3a2c;
      line-height: 1.8;
      margin: 0.8rem 0;
      padding: 0 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* 第一个邀请段突出 */
    .section:first-of-type p:first-child {
      font-size: 1.4rem;
      background: #fff1e6;
      border-radius: 60px;
      padding: 0.8rem 1.5rem;
      margin: 1rem 0 0.5rem;
      border: 1px solid #ffcfb0;
      color: #7b422b;
      font-weight: 500;
      justify-content: center;
    }

    /* “What to bring” 标题 */
    .section h2 {
      font-size: 2rem;
      font-weight: 600;
      color: #a1421d;
      margin: 1.8rem 0 1rem 0;
      padding-left: 0.8rem;
      border-left: 10px solid #fcb17a;
      background: linear-gradient(to right, #ffefe2, transparent);
      padding: 0.6rem 1.2rem;
      border-radius: 0 40px 40px 0;
    }

    /* 带圆点段落美化 */
    .section p:has(•) {
      padding-left: 1.5rem;
      position: relative;
      font-size: 1.25rem;
    }

    .section p:has(•)::before {
      content: "🎁";
      position: absolute;
      left: -0.2rem;
      top: 0;
      font-size: 1.4rem;
      filter: drop-shadow(0 2px 2px #ffb08a);
    }

    /* 图片区域——更大、更醒目 */
    img {
      display: block;
      width: 100%;
      max-width: 700px;        /* 图片最大宽度加大 */
      height: auto;
      margin: 2rem auto 1.5rem;
      border-radius: 40px 40px 40px 12px;  /* 活泼的非对称圆角 */
      box-shadow: 0 25px 35px -10px rgba(180, 90, 30, 0.4),
                  0 10px 0 0 #ffbc8c,
                  0 0 0 4px #fffcf5;
      transform: rotate(0.5deg);
      transition: transform 0.2s, box-shadow 0.2s;
      /* 确保图片占据足够视觉重量 */
      min-height: 280px;        /* 保证即使图片加载慢也有一定高度 */
      object-fit: cover;        /* 保持比例，防止变形 */
    }

    img:hover {
      transform: rotate(0deg) scale(1.02);
      box-shadow: 0 28px 40px -8px #b25f32, 0 10px 0 0 #ffa45e, 0 0 0 4px #fffcf5;
    }

    /* 返回链接 */
    .back-link {
      text-align: center;
      margin: 2.2rem 0 0.5rem;
    }

    .back-link a {
      display: inline-block;
      background: #fadbc8;
      color: #813f20;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.3rem;
      padding: 0.9rem 2.5rem;
      border-radius: 60px;
      box-shadow: 0 6px 0 #be7a58, 0 10px 18px -8px #d49c7a;
      border: 1px solid #ffdabe;
      transition: all 0.15s ease;
      letter-spacing: 1px;
    }

    .back-link a:hover {
      background: #ffccb0;
      box-shadow: 0 3px 0 #be7a58, 0 12px 20px -8px #b75f35;
      transform: translateY(3px);
    }

    /* 小屏幕优化 */
    @media (max-width: 600px) {
      .birthday-card {
        padding: 1.8rem 1.2rem;
        border-radius: 36px;
      }

      .birthday-card h1 {
        font-size: 2.5rem;
      }

      .birthday-card h2 {
        font-size: 1.6rem;
      }

      .section h2 {
        font-size: 1.7rem;
      }

      img {
        border-radius: 30px 30px 30px 8px;
        max-width: 100%;
        min-height: 200px;
      }
    }

    /* 保留原符号颜色 */
    .section p:has(•) {
      color: #4b3621;
    }
  </style>
</head>
<body>
  <!-- 生日卡片容器 -->
  <div class="birthday-card">
    <h1>It's My Birthday!</h1>
    <h2>On the 29th July</h2>

    <!-- 邀请区块 -->
    <div class="section">
      <p>You're invited to celebrate my birthday with me!</p>
      <p>Come and have fun, eat cake, and spend a happy time together.</p>
    </div>

    <!-- 携带物品区块 -->
    <div class="section">
      <h2>What to bring:</h2>
      <p>• Good mood 😊</p>
      <p>• Big appetite for cake 🎂</p>
      <p>• Your warm smile 😃</p>
    </div>

    <!-- 图片：尺寸已加大，成为视觉焦点 -->
    <img src="https://tse2-mm.cn.bing.net/th/id/OIP-C.kdUixidq3u-FLFzQWvqF9wHaD_?w=320&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3" 
         alt="Colorful birthday cake with sprinkles and candles">

    <!-- 返回链接 -->
    <div class="back-link">
      <a href="index.html">← Back to Portfolio</a>
    </div>
  </div>
</body>
</html>
